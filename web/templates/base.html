<!DOCTYPE html>
<html>
<head>
    {% load i18n %}
    {% load allauth i18n %}
    {% load static %}
    {% load account %}
    <title>Helden ONLINE - {% block title %}{% endblock title %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/ext.css' %}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicons/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicons/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'favicons/site.webmanifest' %}">

</head>
<body class="heon-light-grey">

<!-- Top container -->
<div class="heon-bar heon-top heon-dark-grey heon-large" style="z-index:4">
  <button class="heon-bar-item heon-button heon-hide-large heon-hover-none heon-hover-text-light-grey" onclick="heon_open();"><span class="material-icons md-fw">menu</span>  Menu</button>
  <span class="heon-bar-item heon-right"><img src="{% static 'images/heon_logo.png' %}" width="30px">Helden ONLINE</span>
</div>
{% if messages %}
  <div class="heon-top-message">
    {% for message in messages %}
      <div class="heon-top-message-item {% if message.tags == 'success' %}heon-green{% elif message.tags == 'error' %}heon-red{% else %}heon-grey{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}


{% include 'sidebar.html' %}



<!-- Overlay effect when opening sidebar on small screens -->
<div class="heon-overlay heon-hide-large heon-animate-opacity" onclick="w3_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>

<!-- !PAGE CONTENT! -->
<div class="heon-main{% if messages %} heon-main-with-message{% endif %}" style="margin-left:300px;margin-top:43px;">


{% block content %}

{% endblock %}

  <!-- End page content -->
</div>

<script>
// Get the Sidebar
var heonMainSidebar = document.getElementById("heonMainSidebar");

// Get the DIV with overlay effect
var overlayBg = document.getElementById("myOverlay");

// Toggle between showing and hiding the sidebar, and add overlay effect
function heon_open() {
  if (heonMainSidebar.style.display === 'block') {
    heonMainSidebar.style.display = 'none';
    overlayBg.style.display = "none";
  } else {
    heonMainSidebar.style.display = 'block';
    overlayBg.style.display = "block";
  }
}

// Close the sidebar with the close button
function w3_close() {
  heonMainSidebar.style.display = "none";
  overlayBg.style.display = "none";
}

document.addEventListener('click', function(event) {
  var button = event.target.closest('[data-clear-target]');
  if (!button) {
    return;
  }
  var checkbox = document.getElementById(button.getAttribute('data-clear-target'));
  if (!checkbox) {
    return;
  }
  checkbox.checked = true;
  var upload = button.closest('.portrait-upload');
  if (upload) {
    upload.classList.add('portrait-upload-cleared');
  }
});

document.addEventListener('change', function(event) {
  if (!event.target.matches('.portrait-upload input[type="file"]')) {
    return;
  }
  var upload = event.target.closest('.portrait-upload');
  if (!upload) {
    return;
  }
  var checkbox = upload.querySelector('.portrait-upload-clear-checkbox');
  if (checkbox) {
    checkbox.checked = false;
  }
  upload.classList.remove('portrait-upload-cleared');
});
</script>

</body>
</html>
