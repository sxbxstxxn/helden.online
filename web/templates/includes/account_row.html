<div class="heon-row"{% if row_style %} style="{{ row_style }}"{% endif %}>
    <div class="heon-col s4" style="padding-top:8px">
        <label for="{{ id }}"><strong>{{ label }}</strong></label>
    </div>
    <div class="heon-col s8">
        {{ field|safe }}
        {% if error %}
            <span class="heon-text-red">{{ error|striptags }}</span>
        {% endif %}
    </div>
</div>
